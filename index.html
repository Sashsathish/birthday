<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Jahnavi!</title>
    <style>
        :root {
            --primary-pink: #ff6b6b;
            --secondary-pink: #f06292;
            --gold: #ffd700;
            --bg-gradient: linear-gradient(135deg, #fce4ec 0%, #f8bbd0 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body {
            background: var(--bg-gradient);
            overflow-x: hidden;
            text-align: center;
            color: #444;
        }

        /* --- Welcome Screen --- */
        #welcome-screen {
            position: fixed;
            inset: 0;
            background: white;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s ease;
        }

        .btn-start {
            padding: 15px 40px;
            font-size: 1.5rem;
            background: var(--primary-pink);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255,107,107,0.4);
            animation: pulse 2s infinite;
        }

        /* --- Header & Landing --- */
        header { padding: 50px 20px; }
        h1 { font-size: 3rem; color: var(--secondary-pink); margin-bottom: 10px; }

        /* --- Countdown --- */
        .countdown-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 30px 0;
        }
        .time-box {
            background: white;
            padding: 15px;
            border-radius: 10px;
            min-width: 80px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .time-box span { display: block; font-size: 2rem; font-weight: bold; color: var(--primary-pink); }

        /* --- Typing Message --- */
        #message-box {
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
            font-size: 1.2rem;
            min-height: 100px;
            font-style: italic;
        }

        /* --- Interactive Cake --- */
        .cake-container { position: relative; height: 250px; margin: 50px auto; cursor: pointer; width: 200px; }
        .cake {
            position: absolute; bottom: 0; width: 200px; height: 120px;
            background: #f48fb1; border-radius: 10px 10px 0 0;
            transition: transform 0.3s;
        }
        .candle {
            position: absolute; top: -40px; left: 50%; transform: translateX(-50%);
            width: 10px; height: 40px; background: #ffee58;
        }
        .flame {
            width: 15px; height: 20px; background: orange; border-radius: 50%;
            position: absolute; top: -15px; left: -2.5px;
            animation: flicker 0.5s infinite alternate;
        }
        .cake.cut { transform: scaleY(0.8) translateY(20px); filter: grayscale(0.5); }

        /* --- Guest Book --- */
        .guest-section {
            background: rgba(255, 255, 255, 0.8);
            padding: 40px 20px;
            margin-top: 50px;
        }
        .wish-input { padding: 10px; width: 250px; border-radius: 5px; border: 1px solid #ddd; }
        #wish-list { list-style: none; margin-top: 20px; max-width: 400px; margin-inline: auto; }
        .wish-item {
            background: white; margin: 10px 0; padding: 10px;
            border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            animation: slideIn 0.5s ease-out;
        }

        /* --- Animations --- */
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        @keyframes flicker { from { opacity: 0.8; transform: scale(1); } to { opacity: 1; transform: scale(1.1); } }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        canvas#confetti-canvas {
            position: fixed; top: 0; left: 0; pointer-events: none; z-index: 999;
        }
    </style>
</head>
<body>

    <div id="welcome-screen">
        <h1>A Special Surprise Awaits...</h1>
        <button class="btn-start" onclick="startCelebration()">Click to Start 🎉</button>
    </div>

    <audio id="bg-music" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <canvas id="confetti-canvas"></canvas>

    <header>
        <h1 id="headline">Happy Birthday Jahnavi! 🎂</h1>
        <p>Wishing you a day filled with love and laughter.</p>
    </header>

    <div class="countdown-container" id="countdown">
        <div class="time-box"><span id="days">00</span>Days</div>
        <div class="time-box"><span id="hours">00</span>Hrs</div>
        <div class="time-box"><span id="mins">00</span>Mins</div>
        <div class="time-box"><span id="secs">00</span>Secs</div>
    </div>

    <div id="message-box"></div>

    <div class="cake-container" onclick="cutCake()">
        <div class="candle" id="candle">
            <div class="flame" id="flame"></div>
        </div>
        <div class="cake" id="cake-body"></div>
        <p style="margin-top: 130px;">Click the cake to cut!</p>
    </div>

    <section class="guest-section">
        <h3>Leave a Wish</h3>
        <input type="text" id="guest-name" placeholder="Your Name" class="wish-input">
        <input type="text" id="guest-wish" placeholder="Write a message..." class="wish-input">
        <button onclick="addWish()" class="btn-start" style="padding: 10px 20px; font-size: 1rem;">Send</button>
        <ul id="wish-list"></ul>
    </section>

    <script>
        // --- 1. Start Audio & UI ---
        function startCelebration() {
            document.getElementById('welcome-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('welcome-screen').style.display = 'none';
                startTyping();
            }, 800);
            
            const music = document.getElementById('bg-music');
            music.play().catch(e => console.log("Audio needs interaction first"));
        }

        // --- 2. Countdown Logic ---
        const targetDate = new Date("April 3, 2026 00:00:00").getTime();

        const timer = setInterval(() => {
            const now = new Date().getTime();
            const diff = targetDate - now;

            if (diff <= 0) {
                clearInterval(timer);
                document.getElementById('headline').innerText = "IT'S CELEBRATION TIME! 🎊";
                triggerConfetti();
                return;
            }

            document.getElementById('days').innerText = Math.floor(diff / (1000 * 60 * 60 * 24));
            document.getElementById('hours').innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            document.getElementById('mins').innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            document.getElementById('secs').innerText = Math.floor((diff % (1000 * 60)) / 1000);
        }, 1000);

        // --- 3. Typing Animation ---
        const message = "Dear Jahnavi, on your special day, I hope you find every reason to smile. May your year ahead be as wonderful as you are! Keep shining! ✨";
        let i = 0;
        function startTyping() {
            if (i < message.length) {
                document.getElementById("message-box").innerHTML += message.charAt(i);
                i++;
                setTimeout(startTyping, 50);
            }
        }

        // --- 4. Cake Cutting ---
        function cutCake() {
            const cake = document.getElementById('cake-body');
            const flame = document.getElementById('flame');
            if (!cake.classList.contains('cut')) {
                cake.classList.add('cut');
                flame.style.display = 'none'; // Blow out candle
                triggerConfetti();
                alert("Yum! The cake is served! 🍰");
            }
        }

        // --- 5. Confetti Effect (Canvas) ---
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        let particles = [];

        function triggerConfetti() {
            for (let i = 0; i < 100; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height - canvas.height,
                    size: Math.random() * 10 + 5,
                    color: `hsl(${Math.random() * 360}, 70%, 60%)`,
                    speed: Math.random() * 3 + 2,
                    angle: Math.random() * 6
                });
            }
            animateConfetti();
        }

        function animateConfetti() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p, index) => {
                p.y += p.speed;
                p.x += Math.sin(p.angle);
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, p.size, p.size);
                if (p.y > canvas.height) particles.splice(index, 1);
            });
            if (particles.length > 0) requestAnimationFrame(animateConfetti);
        }

        // --- 6. Guest Wishes ---
        function addWish() {
            const name = document.getElementById('guest-name').value;
            const text = document.getElementById('guest-wish').value;
            if (!name || !text) return alert("Please fill both fields!");

            const li = document.createElement('li');
            li.className = 'wish-item';
            li.innerHTML = `<strong>${name}:</strong> ${text}`;
            document.getElementById('wish-list').prepend(li);

            // Clear inputs
            document.getElementById('guest-name').value = '';
            document.getElementById('guest-wish').value = '';
        }
    </script>
</body>
</html>
