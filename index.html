<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday for Jahnavi</title>
    <style>
        :root {
            --pink: #ff85a2;
            --dark-pink: #f06292;
            --bg: #fff0f3;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            font-family: 'Arial', sans-serif;
            color: #333;
            overflow-x: hidden;
        }

        /* --- Fixed Overlay --- */
        #overlay {
            position: fixed;
            inset: 0;
            background: white;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: 0.5s;
        }

        /* --- Layout --- */
        .section {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            padding: 40px 20px;
            text-align: center;
            position: relative;
        }

        header h1 { color: var(--dark-pink); font-size: 2.5rem; margin-bottom: 20px; }

        /* --- Countdown --- */
        .timer {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 40px;
        }
        .unit {
            background: white;
            padding: 15px 5px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .unit span { display: block; font-size: 1.5rem; font-weight: bold; color: var(--pink); }

        /* --- Cake --- */
        .cake-box {
            height: 180px;
            width: 150px;
            margin: 0 auto;
            cursor: pointer;
            position: relative;
        }
        .cake {
            width: 100%;
            height: 80px;
            background: var(--pink);
            position: absolute;
            bottom: 0;
            border-radius: 10px 10px 0 0;
            transition: 0.3s;
        }
        .candle {
            width: 8px;
            height: 30px;
            background: #ffd54f;
            margin: 0 auto;
            position: relative;
            top: 60px;
        }
        .flame {
            width: 12px;
            height: 18px;
            background: orange;
            border-radius: 50% 50% 20% 20%;
            position: absolute;
            top: -20px;
            left: -2px;
            animation: glow 0.5s infinite alternate;
        }

        .cake.cut { transform: scaleY(0.6); filter: saturate(0.5); }

        /* --- Guestbook --- */
        .wishes {
            background: white;
            padding: 30px;
            border-radius: 20px;
            margin-top: 40px;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        .btn {
            background: var(--dark-pink);
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
        }

        #wish-list div {
            text-align: left;
            padding: 10px;
            border-bottom: 1px solid #eee;
        }

        /* --- Confetti --- */
        #confetti {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 100;
        }

        @keyframes glow { from { opacity: 0.6; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="overlay">
        <h2>Ready for the surprise?</h2>
        <button class="btn" onclick="init()" style="width: auto; margin-top: 20px;">Open 🎁</button>
    </div>

    <canvas id="confetti"></canvas>

    <div class="section">
        <header>
            <h1>Happy Birthday Jahnavi! 🎂</h1>
        </header>

        <div class="timer">
            <div class="unit"><span id="d">00</span>d</div>
            <div class="unit"><span id="h">00</span>h</div>
            <div class="unit"><span id="m">00</span>m</div>
            <div class="unit"><span id="s">00</span>s</div>
        </div>

        <div id="typewriter" style="min-height: 60px; font-style: italic; margin-bottom: 30px;"></div>

        <div class="cake-box" onclick="blowCandle()">
            <div class="candle"><div class="flame" id="flame"></div></div>
            <div class="cake" id="cake-body"></div>
        </div>
        <p style="margin-top: 10px;"><i>Click to cut the cake!</i></p>

        <div class="wishes">
            <h3>Send a Wish</h3>
            <input type="text" id="uName" placeholder="Your Name">
            <input type="text" id="uWish" placeholder="Your Message">
            <button class="btn" onclick="saveWish()">Post Wish</button>
            <div id="wish-list"></div>
        </div>
    </div>

    <script>
        // 1. Start App
        function init() {
            document.getElementById('overlay').style.opacity = '0';
            setTimeout(() => document.getElementById('overlay').style.display = 'none', 500);
            startTyping();
        }

        // 2. Countdown (Target: April 3, 2026)
        const target = new Date("April 3, 2026 00:00:00").getTime();
        setInterval(() => {
            const now = new Date().getTime();
            const diff = target - now;
            if (diff < 0) return;
            document.getElementById('d').innerText = Math.floor(diff / (86400000));
            document.getElementById('h').innerText = Math.floor((diff % 86400000) / 3600000);
            document.getElementById('m').innerText = Math.floor((diff % 3600000) / 60000);
            document.getElementById('s').innerText = Math.floor((diff % 60000) / 1000);
        }, 1000);

        // 3. Typewriter
        const msg = "Wishing you a year full of happiness, success, and love. May all your dreams come true! ✨";
        let charIdx = 0;
        function startTyping() {
            if (charIdx < msg.length) {
                document.getElementById('typewriter').innerHTML += msg.charAt(charIdx);
                charIdx++;
                setTimeout(startTyping, 50);
            }
        }

        // 4. Cake & Confetti
        function blowCandle() {
            document.getElementById('flame').style.display = 'none';
            document.getElementById('cake-body').classList.add('cut');
            createConfetti();
        }

        // Confetti Logic
        const canvas = document.getElementById('confetti');
        const ctx = canvas.getContext('2d');
        let dots = [];

        function createConfetti() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            for(let i=0; i<80; i++) {
                dots.push({
                    x: Math.random() * canvas.width,
                    y: -10,
                    size: Math.random() * 8 + 4,
                    color: `hsl(${Math.random() * 360}, 70%, 60%)`,
                    v: Math.random() * 4 + 2
                });
            }
            draw();
        }

        function draw() {
            // CRITICAL: This clears the canvas so it doesn't "stretch" or ghost
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            dots.forEach((d, i) => {
                d.y += d.v;
                ctx.fillStyle = d.color;
                ctx.fillRect(d.x, d.y, d.size, d.size);
                if (d.y > canvas.height) dots.splice(i, 1);
            });
            if (dots.length > 0) requestAnimationFrame(draw);
        }

        // 5. Wishes
        function saveWish() {
            const n = document.getElementById('uName').value;
            const w = document.getElementById('uWish').value;
            if(!n || !w) return;
            const item = `<div><strong>${n}:</strong> ${w}</div>`;
            document.getElementById('wish-list').innerHTML = item + document.getElementById('wish-list').innerHTML;
            document.getElementById('uName').value = ""; document.getElementById('uWish').value = "";
        }
    </script>
</body>
</html>
